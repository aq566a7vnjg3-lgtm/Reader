<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>アンケートQR読み取り</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="QR読み取り">
<meta name="theme-color" content="#ec6c00">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN','Yu Gothic UI','Meiryo',sans-serif;
  background: #f4f6f8;
  color: #1a1a1a;
  min-height: 100dvh;
}
.bar {
  background: #ec6c00;
  color: #fff;
  padding: 14px 18px;
  font-size: 18px;
  font-weight: 900;
}
.wrap { max-width: 860px; margin: 0 auto; padding: 16px; }
.panel {
  background: #fff;
  border: 1px solid #e5e8ec;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 14px;
}
.title { font-size: 20px; font-weight: 900; margin-bottom: 8px; }
.lead { color: #666; line-height: 1.7; font-size: 14px; margin-bottom: 14px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.btn, .file-label {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 46px;
  padding: 12px 18px;
  border: none;
  border-radius: 8px;
  background: #ec6c00;
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  font-family: inherit;
  cursor: pointer;
}
.btn.secondary { background: #555; }
.file-input {
  position: absolute;
  opacity: 0;
  width: 1px;
  height: 1px;
}
.paste {
  width: 100%;
  min-height: 92px;
  border: 2px solid #e5e8ec;
  border-radius: 8px;
  padding: 12px;
  font-size: 13px;
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  resize: vertical;
  outline: none;
}
.paste:focus { border-color: #ec6c00; }
.status {
  margin-top: 10px;
  color: #777;
  font-size: 13px;
  line-height: 1.6;
}
.status.err { color: #c62828; }
.scanner {
  display: none;
  margin-top: 14px;
  border-radius: 8px;
  overflow: hidden;
  background: #111;
  position: relative;
}
.scanner.show { display: block; }
.scanner video {
  display: block;
  width: 100%;
  max-height: 58vh;
  object-fit: cover;
}
.scan-mark {
  position: absolute;
  inset: 12%;
  border: 3px solid rgba(236,108,0,0.92);
  border-radius: 10px;
  pointer-events: none;
  box-shadow: 0 0 0 999px rgba(0,0,0,0.22);
}
.preview { display: none; }
.preview.show { display: block; }
.a4 {
  background: #fff;
  border: 1px solid #d9dde3;
  border-radius: 8px;
  padding: 16px;
}
.a4h {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 3px solid #ec6c00;
  padding-bottom: 10px;
  margin-bottom: 12px;
}
.a4h-title { color: #ec6c00; font-size: 24px; font-weight: 900; letter-spacing: 2px; }
.date { color: #666; font-size: 13px; white-space: nowrap; }
.section { border: 1px solid #ec6c00; border-radius: 6px; margin-bottom: 10px; overflow: hidden; }
.section-hd { background: #ec6c00; color: #fff; padding: 7px 10px; font-size: 14px; font-weight: 900; }
.grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px 18px; padding: 10px; }
.item { display: flex; gap: 8px; min-width: 0; font-size: 14px; line-height: 1.5; }
.lbl { color: #777; white-space: nowrap; flex-shrink: 0; }
.val { font-weight: 700; min-width: 0; overflow-wrap: anywhere; }
.wide { grid-column: 1 / -1; }
.empty { color: #aaa; font-weight: 400; }
.actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
canvas { display: none; }
.a4 {
  width: 210mm;
  min-height: 297mm;
  margin: 8mm auto 16mm;
  background: #fff;
  padding: 7mm 8mm;
  box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  font-family: 'Hiragino Kaku Gothic ProN','Yu Gothic UI','Meiryo',sans-serif;
  font-size: 10px;
  color: #1a1a1a;
  line-height: 1.4;
}
.a4h {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 3px solid #ec6c00;
  padding-bottom: 5px;
  margin-bottom: 5px;
}
.a4h-title { font-size: 26px; font-weight: 900; color: #ec6c00; letter-spacing: 4px; line-height: 1; }
.a4h-sub { font-size: 8.5px; color: #555; margin-top: 4px; line-height: 1.65; }
.a4h-date {
  border: 2px solid #ec6c00;
  border-radius: 4px;
  padding: 5px 10px;
  text-align: center;
  flex-shrink: 0;
}
.a4h-date .dl { font-size: 8px; color: #777; margin-bottom: 2px; }
.a4h-date .dv { font-size: 11px; font-weight: 700; color: #ec6c00; white-space: nowrap; }
.a4-cust {
  background: #fff3ea;
  border: 1.5px solid #ec6c00;
  border-radius: 5px;
  padding: 5px 8px;
  margin-bottom: 5px;
}
.a4-cust-hd {
  font-size: 9px; font-weight: 700; color: #ec6c00;
  border-bottom: 1px solid #f5cba7;
  padding-bottom: 2px; margin-bottom: 4px;
}
.a4-cust-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px 14px;
}
.a4-crow { display: flex; gap: 4px; align-items: baseline; }
.a4-cl { font-size: 8px; color: #666; flex-shrink: 0; white-space: nowrap; }
.a4-cv {
  font-weight: 700; font-size: 9.5px;
  border-bottom: 1px solid #aab;
  flex: 1; min-width: 0; padding-bottom: 1px;
  overflow-wrap: anywhere;
}
.a4-qgrid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  margin-bottom: 4px;
}
.a4-qbox { border: 1.5px solid #ec6c00; border-radius: 4px; overflow: hidden; }
.a4-qbox.span3 { grid-column: 1 / -1; }
.a4-qhd {
  background: #ec6c00; color: #fff;
  display: flex; align-items: center; gap: 5px;
  padding: 3px 7px;
  font-size: 8.5px; font-weight: 700;
}
.a4-qnum {
  background: #fff; color: #ec6c00;
  font-size: 7.5px; font-weight: 900;
  width: 14px; height: 14px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.a4-qbody { padding: 4px 7px; font-size: 9px; min-height: 26px; line-height: 1.7; overflow-wrap: anywhere; }
.a4-ans { color: #ec6c00; font-weight: 700; }
.a4-none { color: #bbb; font-style: italic; }
.a4-carinfo {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px 8px;
  font-size: 9px;
}
.a4-carinfo span { display: flex; gap: 3px; }
.a4-carinfo .cl { color: #777; font-size: 8px; flex-shrink: 0; }
.a4-staff {
  border: 1.5px dashed #bbb;
  border-radius: 4px;
  padding: 4px 8px;
  margin-bottom: 4px;
}
.a4-staff-hd { font-size: 8px; color: #999; font-weight: 700; margin-bottom: 3px; }
.a4-staff-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 3px 12px;
  font-size: 9px; color: #555;
}
.a4-srow { display: flex; align-items: center; gap: 4px; }
.a4-srow.full { grid-column: 1/-1; }
.a4-si {
  flex: 1; border: none; border-bottom: 1px solid #ccc;
  background: transparent; font-size: 9px; font-family: inherit; outline: none;
}
.a4-priv {
  background: #f5f5f5; border: 1px solid #ccc; border-radius: 3px;
  padding: 4px 7px; display: flex; gap: 6px; align-items: flex-start;
}
.a4-priv-lbl {
  background: #ec6c00; color: #fff; font-size: 7px;
  padding: 1px 4px; border-radius: 2px; flex-shrink: 0; font-weight: 700;
}
.a4-priv-txt { font-size: 6.5px; color: #666; line-height: 1.65; }
@media (max-width: 620px) {
  .grid { grid-template-columns: 1fr; }
  .a4h { flex-direction: column; }
  .a4 { width: 100%; min-height: auto; margin: 0; box-shadow: none; }
  .a4-qgrid, .a4-cust-grid, .a4-carinfo, .a4-staff-grid { grid-template-columns: 1fr; }
}
@media print {
  body { background: #fff; }
  .bar, .input-panel, .actions { display: none !important; }
  .wrap { max-width: none; padding: 0; }
  .panel { border: none; margin: 0; padding: 0; }
  .a4 { border: none; border-radius: 0; padding: 0; }
  .section-hd { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>
<div class="bar">アンケートQR読み取り</div>
<div class="wrap">
  <div class="panel input-panel">
    <div class="title">QRコードを読み取る</div>
    <p class="lead">お客様スマホに表示されたQRコードを撮影、または保存画像から選択してください。読み取れない場合は、QR文字列を貼り付けても復元できます。</p>
    <div class="row">
      <button class="btn" type="button" id="btnLive" onclick="startLiveScan()">ライブ読み取り開始</button>
      <button class="btn secondary" type="button" id="btnStopLive" onclick="stopLiveScan()" style="display:none;">停止</button>
      <label class="file-label" for="qrImage">QR画像を撮影/選択</label>
      <input id="qrImage" class="file-input" type="file" accept="image/*" capture="environment">
      <button class="btn secondary" type="button" onclick="resetAll()">クリア</button>
    </div>
    <div class="scanner" id="scanner">
      <video id="scannerVideo" playsinline muted></video>
      <div class="scan-mark"></div>
    </div>
    <div class="status" id="status">未読み取りです。</div>
  </div>

  <div class="panel input-panel">
    <div class="title">文字列から読み込む</div>
    <textarea id="payloadText" class="paste" placeholder="HCNQ3: から始まるQR文字列を貼り付け"></textarea>
    <div class="actions">
      <button class="btn" type="button" onclick="loadFromText()">読み込む</button>
    </div>
  </div>

  <div class="panel preview" id="preview">
    <div class="a4" id="a4"></div>
    <div class="actions">
      <button class="btn" type="button" onclick="window.print()">印刷する</button>
    </div>
  </div>
</div>
<canvas id="canvas"></canvas>
<script src="jsQR.min.js"></script>
<script src="pako.min.js"></script>
<script>
const DEFAULT_D = {
  q1:'', q2:[], q2o:'', q3:[], q3o:'',
  q4:[], q4ev_charge:'',
  q5_1:'', q5_2:'', q5_3:'', q5_4:'', q5_note:'',
  q6:[],
  q7:'', q7b:[], q7_other:'',
  q8:'',
  q9:[], q9_amt:'',
  q10:'', q10_amt:'',
  q11_co:'', q11_sel:'',
  q12_car:'', q12_yr:'', q12_km:'', q12_sh_y:'', q12_sh_m:'', q12_buy:'', q12_shop:'',
  cf:'', cn:'', cb_y:'', cb_m:'', cb_d:'', ct1:'', ct2:'', ce:'', cz:'', ca:'', cj:'', cfam:'', _date:''
};
const TRANSFER_SECRET = 'HondaCars-NaraChuo-MinamiKyoto-Questionnaire-QR-2026';
const TRANSFER_SALT = 'HondaCarsQuestionnaireQRv2';
const TRANSFER_FIELDS = [
  '_date','cf','cn','cb_y','cb_m','cb_d','ct1','ct2','ce','cz','ca','cj','cfam',
  'q2o','q3o','q5_1','q5_2','q5_3','q5_4','q5_note','q7_other','q9_amt','q10_amt','q11_co',
  'q12_car','q12_yr','q12_km','q12_sh_y','q12_sh_m','q12_buy','q12_shop'
];
const TRANSFER_OPTION_KEYS = ['q1','q2','q3','q4','q4ev_charge','q6','q7','q8','q9','q10','q11_sel'];
const TRANSFER_OPTIONS = {
  q1:['車検が近い','お乗り換えを検討している','初めて車を購入する','家族構成が変わった','安全性能が気になる','燃費を良くしたい','故障・修理が増えた','その他'],
  q2:['折込チラシ','通りがかり','ホームページ','Google検索','SNS','ご紹介','以前ご利用いただいた','近くに来たついで'],
  q3:['新車を見たい','中古車を見たい','試乗したい','見積りが欲しい','査定してほしい','車の情報収集','保険の相談'],
  q4:['FIT（ガソリン/ハイブリッド）','VEZEL（ハイブリッド）','ZR-V（ガソリン/ハイブリッド）','WR-V（ガソリン）','CR-V（ハイブリッド）','FREED（ガソリン/ハイブリッド）','STEP WGN（ガソリン/ハイブリッド）','ODYSSEY（ハイブリッド）','N-BOX / N-BOX JOY（ガソリン）','N-WGN（ガソリン）','N-ONE（ガソリン）','ACCORD（ハイブリッド）','CIVIC（ガソリン/ハイブリッド）','CIVIC TYPE R（ガソリン）','PRELUDE（ハイブリッド）','N-VAN e:','N-ONE e:','INSIGHT','Super-ONE','商用車 N-VAN','福祉車両 N-BOX（福祉）','中古車','その他'],
  q4ev_charge:['ある','ない','検討中'],
  q6:['デザイン','燃費','安全性能','室内の広さ','荷室の広さ','運転のしやすさ','維持費','月々のお支払い','購入価格','リセールバリュー','納期','その他'],
  q7:['本日、ご契約まで検討している','1ヶ月以内','条件が合えば早めに決めたい','3ヶ月以内','まずは比較・検討したい','6ヶ月以内','1年以内','まだ決めていない','その他'],
  q8:['～200万円','～250万円','～300万円','～350万円','～400万円','～450万円','～500万円','～600万円','600万円以上'],
  q9:['現金','均等払いクレジット','残価設定クレジット','リース・サブスク（楽まる）','説明を聞いて比較したい'],
  q10:['査定してほしい','金額だけ知りたい','今回は希望しない'],
  q11_sel:['保険内容も相談したい','今回は相談しない']
};
let liveStream = null;
let liveScanTimer = null;
let liveScanBusy = false;

function setStatus(msg, isErr){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.toggle('err', !!isErr);
}

function setLiveUi(isLive){
  document.getElementById('scanner').classList.toggle('show', isLive);
  document.getElementById('btnLive').style.display = isLive ? 'none' : '';
  document.getElementById('btnStopLive').style.display = isLive ? '' : 'none';
}

function html(v){
  return String(v == null ? '' : v).replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}

function val(v){
  if(Array.isArray(v)) return v.length ? html(v.join('、')) : '<span class="empty">未入力</span>';
  return v ? html(v) : '<span class="empty">未入力</span>';
}

function bytesFromBase64Url(value){
  let b64 = String(value || '').replace(/-/g, '+').replace(/_/g, '/');
  while(b64.length % 4) b64 += '=';
  const bin = atob(b64);
  return Uint8Array.from(bin, c => c.charCodeAt(0));
}

async function gunzipBytes(bytes, alg){
  if(alg === 'none') return bytes;
  if(alg !== 'gzip') throw new Error('対応していない圧縮形式です。');
  if(window.pako) return pako.ungzip(bytes);
  if(!window.DecompressionStream) throw new Error('このブラウザは圧縮データの展開に対応していません。iPadOSを更新するか、別端末でお試しください。');
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}

async function getTransferKey(){
  if(!window.crypto || !crypto.subtle) {
    throw new Error('このブラウザは暗号化データの復号に対応していません。');
  }
  const enc = new TextEncoder();
  const material = await crypto.subtle.importKey(
    'raw',
    enc.encode(TRANSFER_SECRET),
    'PBKDF2',
    false,
    ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:enc.encode(TRANSFER_SALT), iterations:100000, hash:'SHA-256' },
    material,
    { name:'AES-GCM', length:256 },
    false,
    ['decrypt']
  );
}

function parseAnswerObject(obj){
  if(!obj || obj.app !== 'honda-questionnaire' || !obj.data) {
    throw new Error('アンケートデータとして読み込めません。');
  }
  return Object.assign({}, DEFAULT_D, obj.data);
}

function expandCompactTransfer(compact){
  if(!Array.isArray(compact) || !Array.isArray(compact[0]) || !Array.isArray(compact[1])) {
    throw new Error('短縮QRデータとして読み込めません。');
  }
  const out = Object.assign({}, DEFAULT_D);
  compact[0].forEach(([idx, val]) => {
    const key = TRANSFER_FIELDS[idx];
    if(key) out[key] = val;
  });
  compact[1].forEach(([idx, val]) => {
    const key = TRANSFER_OPTION_KEYS[idx];
    if(!key) return;
    const choices = TRANSFER_OPTIONS[key];
    if(Array.isArray(val)){
      out[key] = val.map(item => typeof item === 'number' ? choices[item] : item).filter(Boolean);
    } else {
      out[key] = typeof val === 'number' ? (choices[val] || '') : val;
    }
  });
  return out;
}

async function decodeTransferData(raw){
  const text = String(raw || '').trim();
  if(text.startsWith('HCNQ3:')){
    const envelope = bytesFromBase64Url(text.slice(6));
    if(envelope.length < 30) throw new Error('暗号化QRデータとして読み込めません。');
    const alg = envelope[0] === 1 ? 'gzip' : 'none';
    const iv = envelope.slice(1, 13);
    const encrypted = envelope.slice(13);
    const key = await getTransferKey();
    const plainPacked = new Uint8Array(await crypto.subtle.decrypt(
      { name:'AES-GCM', iv },
      key,
      encrypted
    ));
    const plain = await gunzipBytes(plainPacked, alg);
    return expandCompactTransfer(JSON.parse(new TextDecoder().decode(plain)));
  }

  if(text.startsWith('HCNQ2:')){
    const envelope = JSON.parse(new TextDecoder().decode(bytesFromBase64Url(text.slice(6))));
    if(!envelope || envelope.v !== 2 || !envelope.i || !envelope.d) {
      throw new Error('暗号化QRデータとして読み込めません。');
    }
    const key = await getTransferKey();
    const plainPacked = new Uint8Array(await crypto.subtle.decrypt(
      { name:'AES-GCM', iv:bytesFromBase64Url(envelope.i) },
      key,
      bytesFromBase64Url(envelope.d)
    ));
    const plain = await gunzipBytes(plainPacked, envelope.c);
    const obj = JSON.parse(new TextDecoder().decode(plain));
    return parseAnswerObject(obj);
  }

  if(text.startsWith('HCNQ1:')){
    const obj = JSON.parse(new TextDecoder().decode(bytesFromBase64Url(text.slice(6))));
    return parseAnswerObject(obj);
  }

  throw new Error('対応していないQRデータです。');
}

function ans(val){
  if(!val || (Array.isArray(val)&&!val.length))
    return '<span class="a4-none">—</span>';
  if(Array.isArray(val)) return val.map(v=>`<span class="a4-ans">${html(v)}</span>`).join('、');
  return `<span class="a4-ans">${html(val)}</span>`;
}

function qbox(num, title, content, span3){
  return `<div class="a4-qbox${span3?' span3':''}">
    <div class="a4-qhd"><div class="a4-qnum">${num}</div>${html(title)}</div>
    <div class="a4-qbody">${content}</div>
  </div>`;
}

function renderAnswer(d){
  const q4ev = d.q4.some(i=>['N-VAN e:','N-ONE e:','Super-ONE'].includes(i))&&d.q4ev_charge
    ? `<br><span style="font-size:8px;color:#777;">充電設備：${html(d.q4ev_charge)}</span>` : '';
  const q5list = [d.q5_1,d.q5_2,d.q5_3,d.q5_4].filter(Boolean);
  const carRows = [
    ['車名',d.q12_car],['年式',d.q12_yr],['走行距離',d.q12_km],
    ['次回車検',d.q12_sh_y?(d.q12_sh_y+(d.q12_sh_m?` ${d.q12_sh_m}月`:'')):d.q12_sh_m?`${d.q12_sh_m}月`:''],
    ['購入先',d.q12_buy],['メンテ店',d.q12_shop]
  ].filter(([,v])=>v);

  document.getElementById('a4').innerHTML = `
    <div class="a4h">
      <div>
        <div class="a4h-title">ご来店アンケート</div>
        <div class="a4h-sub">Honda Cars 奈良中央・南京都　ご来店いただきありがとうございます。</div>
      </div>
      <div class="a4h-date"><div class="dl">ご記入日</div><div class="dv">${html(d._date || '')}</div></div>
    </div>

    <div class="a4-cust">
      <div class="a4-cust-hd">お客様情報</div>
      <div class="a4-cust-grid">
        <div class="a4-crow"><span class="a4-cl">フリガナ</span><span class="a4-cv">${html(d.cf||'')}</span></div>

function section(title, rows){
  return `<div class="section"><div class="section-hd">${html(title)}</div><div class="grid">` +
    rows.map(([label, value, wide]) =>
      `<div class="item${wide ? ' wide' : ''}"><span class="lbl">${html(label)}</span><span class="val">${val(value)}</span></div>`
    ).join('') +
    `</div></div>`;
}

async function applyPayload(raw){
  setStatus('暗号化データを復号・展開しています...', false);
  const d = await decodeTransferData(raw);
  renderAnswer(d);
  document.getElementById('payloadText').value = String(raw || '').trim();
  setStatus('読み取りました。下部に回答内容を表示しています。', false);
}

async function startLiveScan(){
  if(liveStream) return;
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setStatus('この表示方法ではカメラを起動できません。GitHub PagesなどのHTTPSで開くか、QR画像を撮影/選択してください。', true);
    return;
  }
  try {
    const video = document.getElementById('scannerVideo');
    liveStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal:'environment' },
        width: { ideal:1280 },
        height: { ideal:720 }
      },
      audio: false
    });
    video.srcObject = liveStream;
    video.setAttribute('playsinline', 'true');
    await video.play();
    setLiveUi(true);
    setStatus('カメラをQRコードに向けてください。読み取ると自動で停止します。', false);
    liveScanTimer = requestAnimationFrame(scanLiveFrame);
  } catch(err) {
    stopLiveScan();
    setStatus('カメラを起動できませんでした。ブラウザのカメラ許可、またはHTTPSで開いているか確認してください。', true);
  }
}

function stopLiveScan(){
  if(liveScanTimer) cancelAnimationFrame(liveScanTimer);
  liveScanTimer = null;
  liveScanBusy = false;
  if(liveStream){
    liveStream.getTracks().forEach(track => track.stop());
    liveStream = null;
  }
  const video = document.getElementById('scannerVideo');
  if(video) video.srcObject = null;
  setLiveUi(false);
}

async function scanLiveFrame(){
  if(!liveStream) return;
  const video = document.getElementById('scannerVideo');
  if(video.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA && !liveScanBusy){
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently:true });
    const max = 900;
    const scale = Math.min(1, max / Math.max(video.videoWidth || 1, video.videoHeight || 1));
    canvas.width = Math.max(1, Math.round((video.videoWidth || 1) * scale));
    canvas.height = Math.max(1, Math.round((video.videoHeight || 1) * scale));
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts:'dontInvert' });
    if(code){
      liveScanBusy = true;
      try {
        await applyPayload(code.data);
        stopLiveScan();
        return;
      } catch(err) {
        liveScanBusy = false;
        setStatus(err.message || '読み込みに失敗しました。', true);
      }
    }
  }
  liveScanTimer = requestAnimationFrame(scanLiveFrame);
}

async function loadFromText(){
  try {
    await applyPayload(document.getElementById('payloadText').value);
  } catch(err) {
    setStatus(err.message || '読み込みに失敗しました。', true);
  }
}

function resetAll(){
  stopLiveScan();
  document.getElementById('payloadText').value = '';
  document.getElementById('preview').classList.remove('show');
  document.getElementById('a4').innerHTML = '';
  setStatus('未読み取りです。', false);
}

document.getElementById('qrImage').addEventListener('change', event => {
  stopLiveScan();
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  const img = new Image();
  img.onload = async () => {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently:true });
    const max = 1600;
    const scale = Math.min(1, max / Math.max(img.width, img.height));
    canvas.width = Math.max(1, Math.round(img.width * scale));
    canvas.height = Math.max(1, Math.round(img.height * scale));
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    URL.revokeObjectURL(img.src);
    if(!code) {
      setStatus('QRコードを読み取れませんでした。明るい場所でQR全体が入るように撮影してください。', true);
      return;
    }
    try {
      await applyPayload(code.data);
    } catch(err) {
      setStatus(err.message || '読み込みに失敗しました。', true);
    }
  };
  img.onerror = () => setStatus('画像を開けませんでした。', true);
  img.src = URL.createObjectURL(file);
});
</script>
